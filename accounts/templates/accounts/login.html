{% extends 'accounts/base.html' %}

{% block title %}Connexion{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white rounded-lg shadow-md p-6">
    <h2 class="text-2xl font-bold mb-6 text-center">Connexion</h2>
    
    <form method="post">
        {% csrf_token %}
        
        <div class="mb-4">
            <label class="block text-gray-700 text-sm font-bold mb-2">Email</label>
            <input type="email" name="username" class="w-full p-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500" required>
        </div>
        
        <div class="mb-4">
            <label class="block text-gray-700 text-sm font-bold mb-2">Mot de passe</label>
            <input type="password" name="password" class="w-full p-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500" required>
        </div>
        
        <button type="submit" class="w-full bg-blue-500 text-white font-bold py-2 px-4 rounded hover:bg-blue-600">
            Se connecter
        </button>
        
        <div class="mt-4 text-center">
            <a href="{% url 'accounts:password_reset' %}" class="text-sm text-blue-500 hover:underline">
                Mot de passe oublié ?
            </a>
            <br>
            <a href="{% url 'accounts:register' %}" class="text-sm text-blue-500 hover:underline">
                Créer un compte
            </a>
        </div>
    </form>
</div>
{% endblock %}
