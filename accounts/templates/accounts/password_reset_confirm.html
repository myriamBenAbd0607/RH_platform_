{% extends 'accounts/base.html' %}

{% block title %}Nouveau mot de passe{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white rounded-lg shadow-md p-6">
    <h2 class="text-2xl font-bold mb-6 text-center">Définir un nouveau mot de passe</h2>
    
    {% if validlink %}
        <form method="post">
            {% csrf_token %}
            
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-bold mb-2">Nouveau mot de passe</label>
                <input type="password" name="new_password1" class="w-full p-2 border rounded" required>
            </div>
            
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-bold mb-2">Confirmer le mot de passe</label>
                <input type="password" name="new_password2" class="w-full p-2 border rounded" required>
            </div>
            
            <button type="submit" class="w-full bg-green-500 text-white font-bold py-2 px-4 rounded hover:bg-green-600">
                Réinitialiser le mot de passe
            </button>
        </form>
    {% else %}
        <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">
            <p>Le lien de réinitialisation est invalide ou a expiré.</p>
        </div>
        <div class="text-center">
            <a href="{% url 'accounts:password_reset' %}" class="text-blue-500 hover:underline">
                Demander un nouveau lien
            </a>
        </div>
    {% endif %}
</div>
{% endblock %}
