{% extends 'accounts/base.html' %}

{% block title %}Mot de passe réinitialisé{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white rounded-lg shadow-md p-6">
    <h2 class="text-2xl font-bold mb-6 text-center">Mot de passe réinitialisé</h2>
    
    <div class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded mb-4">
        <p>Votre mot de passe a été réinitialisé avec succès !</p>
    </div>
    
    <div class="text-center">
        <a href="{% url 'accounts:login' %}" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">
            Se connecter
        </a>
    </div>
</div>
{% endblock %}
