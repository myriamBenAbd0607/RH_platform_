{% extends 'accounts/base.html' %}

{% block title %}Désactiver employé{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white rounded-lg shadow-md p-6">
    <h1 class="text-2xl font-bold mb-6 text-red-600">Changer le statut</h1>
    
    <p class="mb-4">Employé: <strong>{{ employee.get_full_name }}</strong></p>
    <p class="mb-4">Statut actuel: <strong>{{ employee.get_status_display_fr }}</strong></p>
    
    <form method="post">
        {% csrf_token %}
        
        <div class="mb-4">
            <label class="block text-gray-700 font-bold mb-2">Nouveau statut</label>
            {{ form.status }}
        </div>
        
        <div class="flex justify-end space-x-2 mt-6">
            <a href="{% url 'accounts:employee_list' %}" class="bg-gray-500 text-white px-4 py-2 rounded hover:bg-gray-600">
                Annuler
            </a>
            <button type="submit" class="bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600">
                Confirmer
            </button>
        </div>
    </form>
</div>
{% endblock %}
